<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>edits — hugh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            line-height: 1.6;
            z-index: 10;
            max-width: 400px;
        }
        #count {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            z-index: 10;
            text-align: right;
        }
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            z-index: 10;
        }
        #latest {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            z-index: 10;
            text-align: right;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="status">connecting...</div>
    <div id="count"></div>
    <div id="info">
        every light is a wikipedia edit happening right now<br>
        human edits are bright — bot edits are dim<br>
        color is the language
    </div>
    <div id="latest"></div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const countEl = document.getElementById('count');
    const latestEl = document.getElementById('latest');

    let W, H;
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Language → hue mapping
    const langHues = {};
    let hueCounter = 0;
    function hueForLang(lang) {
        if (!langHues[lang]) {
            // Some fixed assignments for major languages
            const fixed = {
                'en': 210,    // blue
                'de': 45,     // amber
                'fr': 280,    // violet
                'es': 20,     // orange
                'ru': 160,    // teal
                'ja': 340,    // pink
                'zh': 0,      // red
                'ko': 310,    // magenta
                'it': 120,    // green
                'pt': 30,     // warm orange
                'nl': 55,     // gold
                'pl': 180,    // cyan
                'ar': 90,     // yellow-green
                'he': 70,     // yellow
                'sv': 200,    // steel blue
                'uk': 150,    // sea green
                'cs': 240,    // indigo
                'fi': 260,    // purple
            };
            if (fixed[lang]) {
                langHues[lang] = fixed[lang];
            } else {
                langHues[lang] = (hueCounter * 137.508) % 360; // golden angle
                hueCounter++;
            }
        }
        return langHues[lang];
    }

    // Particles
    const particles = [];
    const MAX_PARTICLES = 600;

    class Particle {
        constructor(edit) {
            this.x = Math.random() * W;
            this.y = Math.random() * H;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.3 - 0.15; // slight upward drift
            this.life = 1.0;
            this.decay = 0.002 + Math.random() * 0.003;
            this.isBot = edit.bot;
            this.isHuman = !edit.bot;
            this.lang = edit.lang || 'en';
            this.hue = hueForLang(this.lang);
            this.title = edit.title || '';
            this.size = this.isHuman ? (2 + Math.random() * 3) : (1 + Math.random() * 1.5);
            this.brightness = this.isHuman ? 1.0 : 0.25;
            // Size by change magnitude
            const delta = Math.abs((edit.newLen || 0) - (edit.oldLen || 0));
            if (delta > 5000) this.size *= 2;
            else if (delta > 1000) this.size *= 1.5;
            // Pulse
            this.pulsePhase = Math.random() * Math.PI * 2;
            this.born = performance.now();
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
            this.pulsePhase += 0.02;
        }

        draw() {
            const pulse = 1 + Math.sin(this.pulsePhase) * 0.2;
            const r = this.size * pulse;
            const alpha = this.life * this.brightness;

            // Glow
            const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
            gradient.addColorStop(0, `hsla(${this.hue}, 70%, 70%, ${alpha * 0.8})`);
            gradient.addColorStop(0.3, `hsla(${this.hue}, 60%, 50%, ${alpha * 0.3})`);
            gradient.addColorStop(1, `hsla(${this.hue}, 50%, 30%, 0)`);

            ctx.beginPath();
            ctx.arc(this.x, this.y, r * 4, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Core
            ctx.beginPath();
            ctx.arc(this.x, this.y, r * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${this.hue}, 40%, 90%, ${alpha})`;
            ctx.fill();
        }
    }

    // Stats
    let totalEdits = 0;
    let humanEdits = 0;
    let langCounts = {};
    let recentTitles = [];

    function addEdit(edit) {
        totalEdits++;
        if (!edit.bot) humanEdits++;
        const lang = edit.lang || '?';
        langCounts[lang] = (langCounts[lang] || 0) + 1;

        if (!edit.bot && edit.title) {
            recentTitles.unshift({ title: edit.title, lang: lang, time: new Date() });
            if (recentTitles.length > 5) recentTitles.pop();
        }

        // Add particle
        if (particles.length < MAX_PARTICLES) {
            particles.push(new Particle(edit));
        } else {
            // Replace oldest
            let oldest = 0;
            for (let i = 1; i < particles.length; i++) {
                if (particles[i].life < particles[oldest].life) oldest = i;
            }
            particles[oldest] = new Particle(edit);
        }
    }

    // Connect to Wikimedia EventStream
    function connect() {
        status.textContent = 'connecting...';
        const source = new EventSource('https://stream.wikimedia.org/v2/stream/recentchange');

        source.onopen = () => {
            status.textContent = 'live';
            setTimeout(() => { status.style.opacity = '0.1'; }, 3000);
        };

        source.onmessage = (event) => {
            try {
                const d = JSON.parse(event.data);
                if (d.type !== 'edit') return;

                const serverName = d.server_name || '';
                // Extract language from server name
                let lang = '?';
                const match = serverName.match(/^(\w+)\.wikipedia\.org/);
                if (match) {
                    lang = match[1];
                } else if (serverName.includes('wikidata')) {
                    lang = 'wd';
                } else if (serverName.includes('commons')) {
                    lang = 'cm';
                } else if (serverName.includes('wiktionary')) {
                    const m2 = serverName.match(/^(\w+)\./);
                    if (m2) lang = m2[1];
                }

                addEdit({
                    bot: d.bot || false,
                    title: d.title || '',
                    lang: lang,
                    oldLen: d.length ? d.length.old : 0,
                    newLen: d.length ? d.length.new : 0
                });
            } catch (e) {}
        };

        source.onerror = () => {
            status.textContent = 'reconnecting...';
            status.style.opacity = '1';
            source.close();
            setTimeout(connect, 3000);
        };
    }

    // Animation
    function animate() {
        ctx.fillStyle = 'rgba(10, 10, 15, 0.08)';
        ctx.fillRect(0, 0, W, H);

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
            }
        }

        // Update count display
        const topLangs = Object.entries(langCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 8)
            .map(([l, c]) => `${l}: ${c}`)
            .join('\n');

        countEl.textContent = `${totalEdits.toLocaleString()} edits\n${humanEdits.toLocaleString()} human\n\n${topLangs}`;

        // Update latest titles
        if (recentTitles.length > 0) {
            latestEl.innerHTML = recentTitles
                .map(t => `<span style="color: hsla(${hueForLang(t.lang)}, 60%, 60%, 0.5)">${escapeHtml(t.title)}</span>`)
                .join('<br>');
        }

        requestAnimationFrame(animate);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    connect();
    animate();
    </script>
</body>
</html>
