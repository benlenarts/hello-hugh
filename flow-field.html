<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Flow Field</title>
<style>
  body { margin: 0; background: #0a0a0a; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Noise function (simple value noise)
function hash(x, y) {
  let h = x * 374761393 + y * 668265263;
  h = (h ^ (h >> 13)) * 1274126177;
  return ((h ^ (h >> 16)) & 0x7fffffff) / 0x7fffffff;
}

function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx);
  const sy = fy * fy * (3 - 2 * fy);
  const a = hash(ix, iy), b = hash(ix + 1, iy);
  const c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1);
  return a + sx * (b - a) + sy * (c - a) + sx * sy * (a - b - c + d);
}

function noise(x, y, octaves = 4) {
  let val = 0, amp = 1, freq = 1, max = 0;
  for (let i = 0; i < octaves; i++) {
    val += smoothNoise(x * freq, y * freq) * amp;
    max += amp;
    amp *= 0.5;
    freq *= 2;
  }
  return val / max;
}

// Particles
const NUM = 3000;
const particles = [];
const SCALE = 0.003;
let time = 0;

// Color palette — warm to cool
function particleColor(x, y, age) {
  const n = noise(x * 0.002, y * 0.002 + 100);
  const hue = 200 + n * 160; // blue to pink/orange range
  const sat = 60 + Math.sin(age * 0.01) * 20;
  const light = 50 + noise(x * 0.005, y * 0.005 + 50) * 20;
  const alpha = Math.min(age * 0.01, 0.4) * (1 - Math.max(0, age - 300) / 200);
  return `hsla(${hue}, ${sat}%, ${light}%, ${Math.max(0, alpha)})`;
}

function spawn() {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    age: 0,
    maxAge: 200 + Math.random() * 300
  };
}

for (let i = 0; i < NUM; i++) {
  const p = spawn();
  p.age = Math.random() * p.maxAge; // stagger start
  particles.push(p);
}

// Fade the background slowly
ctx.fillStyle = '#0a0a0a';
ctx.fillRect(0, 0, W, H);

function draw() {
  // Very subtle fade — trails persist
  ctx.fillStyle = 'rgba(10, 10, 10, 0.012)';
  ctx.fillRect(0, 0, W, H);

  time += 0.002;

  for (const p of particles) {
    const angle = noise(p.x * SCALE, p.y * SCALE + time) * Math.PI * 4;
    const speed = 0.5 + noise(p.x * SCALE * 2, p.y * SCALE * 2 + time + 50) * 1.5;

    const prevX = p.x;
    const prevY = p.y;

    p.x += Math.cos(angle) * speed;
    p.y += Math.sin(angle) * speed;
    p.age++;

    // Draw
    if (p.age > 2) {
      ctx.beginPath();
      ctx.moveTo(prevX, prevY);
      ctx.lineTo(p.x, p.y);
      ctx.strokeStyle = particleColor(p.x, p.y, p.age);
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // Reset if out of bounds or too old
    if (p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10 || p.age > p.maxAge) {
      Object.assign(p, spawn());
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
